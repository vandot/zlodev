name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-linux
            os: ubuntu-latest
            artifact: zlodev-linux-amd64
            ext: tar.gz
          - target: aarch64-linux
            os: ubuntu-latest
            artifact: zlodev-linux-arm64
            ext: tar.gz
          - target: x86_64-macos
            os: macos-latest
            artifact: zlodev-darwin-amd64
            ext: tar.gz
          - target: aarch64-macos
            os: macos-latest
            artifact: zlodev-darwin-arm64
            ext: tar.gz
          - target: x86_64-windows
            os: windows-latest
            artifact: zlodev-windows-amd64
            ext: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Install OpenSSL (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev

      - name: Install OpenSSL (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install openssl -y --no-progress

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build (Unix)
        if: matrix.os != 'windows-latest'
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe -Dversion=${{ steps.version.outputs.VERSION }}

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: >
          zig build
          -Dtarget=${{ matrix.target }}
          -Doptimize=ReleaseSafe
          -Dversion=${{ steps.version.outputs.VERSION }}
          -Dopenssl-include="C:\Program Files\OpenSSL-Win64\include"
          -Dopenssl-lib="C:\Program Files\OpenSSL-Win64\lib"

      - name: Package (tar.gz)
        if: matrix.ext == 'tar.gz'
        run: tar -czf ${{ matrix.artifact }}.tar.gz -C zig-out/bin zlodev

      - name: Package (zip)
        if: matrix.ext == 'zip'
        shell: bash
        run: cd zig-out/bin && 7z a -tzip ../../${{ matrix.artifact }}.zip zlodev.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
