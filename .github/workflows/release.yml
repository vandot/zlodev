name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-linux
            artifact: zlodev-linux-amd64
          - target: aarch64-linux
            artifact: zlodev-linux-arm64
          - target: aarch64-macos
            artifact: zlodev-darwin-arm64
          - target: x86_64-windows
            artifact: zlodev-windows-amd64

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }} -Dversion=${{ steps.version.outputs.VERSION }}

      - name: Package
        run: |
          if [ "${{ matrix.target }}" = "x86_64-windows" ]; then
            cd zig-out/bin && zip ../../${{ matrix.artifact }}.zip zlodev.exe
          else
            tar -czf ${{ matrix.artifact }}.tar.gz -C zig-out/bin zlodev
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
