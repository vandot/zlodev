name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Install OpenSSL
        run: sudo apt-get update && sudo apt-get install -y libssl-dev

      - name: Build
        run: zig build

      - name: Test dns
        run: zig test src/dns.zig

      - name: Test requests + har
        run: zig test src/har.zig

      - name: Test proxy
        run: zig test src/proxy.zig

      - name: Test intercept
        run: zig test src/intercept.zig

      - name: Test requests
        run: zig test src/requests.zig

  build-and-test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Build
        run: zig build

      - name: Test dns
        run: zig test src/dns.zig

      - name: Test requests + har
        run: zig test src/har.zig

      - name: Test proxy
        run: zig test src/proxy.zig

      - name: Test intercept
        run: zig test src/intercept.zig

      - name: Test requests
        run: zig test src/requests.zig

  build-and-test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Install OpenSSL
        run: choco install openssl -y --no-progress

      - name: Find OpenSSL paths
        id: openssl
        shell: pwsh
        run: |
          $base = if (Test-Path "C:\Program Files\OpenSSL-Win64") { "C:\Program Files\OpenSSL-Win64" }
                  elseif (Test-Path "C:\Program Files\OpenSSL") { "C:\Program Files\OpenSSL" }
                  else { throw "OpenSSL not found" }
          $inc = "$base\include"
          $lib = if (Test-Path "$base\lib\VC\x64\MD") { "$base\lib\VC\x64\MD" }
                 elseif (Test-Path "$base\lib\VC") { "$base\lib\VC" }
                 else { "$base\lib" }
          echo "inc=$inc" >> $env:GITHUB_OUTPUT
          echo "lib=$lib" >> $env:GITHUB_OUTPUT
          echo "Found OpenSSL: inc=$inc lib=$lib"
          ls $lib

      - name: Build
        run: zig build -Dopenssl-include="${{ steps.openssl.outputs.inc }}" -Dopenssl-lib="${{ steps.openssl.outputs.lib }}"

      - name: Test dns
        run: zig test src/dns.zig

      - name: Test requests + har
        run: zig test src/har.zig

      - name: Test intercept
        run: zig test src/intercept.zig

      - name: Test requests
        run: zig test src/requests.zig
