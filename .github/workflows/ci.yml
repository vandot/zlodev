name: CI

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'build.zig'
      - 'build.zig.zon'
      - 'tests/**'
  pull_request:
    paths:
      - 'src/**'
      - 'build.zig'
      - 'build.zig.zon'
      - 'tests/**'

jobs:
  build-and-test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Build
        run: zig build

      - name: Test dns
        run: zig test src/dns.zig

      - name: Test requests + har
        run: zig test src/har.zig

      - name: Test proxy
        run: zig test src/proxy.zig

      - name: Test intercept
        run: zig test src/intercept.zig

      - name: Test requests
        run: zig test src/requests.zig

      - name: Test search
        run: zig test src/search.zig

      - name: Test clipboard
        run: zig test src/clipboard.zig

      - name: Test install/uninstall
        run: zig test tests/install.zig

  build-and-test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Build
        run: zig build

      - name: Test dns
        run: zig test src/dns.zig

      - name: Test requests + har
        run: zig test src/har.zig

      - name: Test proxy
        run: zig test src/proxy.zig

      - name: Test intercept
        run: zig test src/intercept.zig

      - name: Test requests
        run: zig test src/requests.zig

      - name: Test search
        run: zig test src/search.zig

      - name: Test clipboard
        run: zig test src/clipboard.zig

      - name: Test install/uninstall
        run: zig test tests/install.zig

  build-and-test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set HostName to match LocalHostName
        run: sudo scutil --set HostName "$(scutil --get LocalHostName)"

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Build
        run: zig build

      - name: Test dns
        run: zig test src/dns.zig

      - name: Test requests + har
        run: zig test src/har.zig

      - name: Test proxy
        run: zig test src/proxy.zig

      - name: Test intercept
        run: zig test src/intercept.zig

      - name: Test requests
        run: zig test src/requests.zig

      - name: Test search
        run: zig test src/search.zig

      - name: Test clipboard
        run: zig test src/clipboard.zig

      - name: Test install/uninstall
        run: zig test tests/install.zig
