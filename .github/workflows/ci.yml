name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Install OpenSSL
        run: sudo apt-get update && sudo apt-get install -y libssl-dev

      - name: Build
        run: zig build

      - name: Test dns
        run: zig test src/dns.zig

      - name: Test requests + har
        run: zig test src/har.zig

      - name: Test proxy
        run: zig test src/proxy.zig

      - name: Test intercept
        run: zig test src/intercept.zig

      - name: Test requests
        run: zig test src/requests.zig

  build-and-test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Build
        run: zig build

      - name: Test dns
        run: zig test src/dns.zig

      - name: Test requests + har
        run: zig test src/har.zig

      - name: Test proxy
        run: zig test src/proxy.zig

      - name: Test intercept
        run: zig test src/intercept.zig

      - name: Test requests
        run: zig test src/requests.zig

