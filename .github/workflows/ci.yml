name: CI

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'build.zig'
      - 'build.zig.zon'
      - 'tests/**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'src/**'
      - 'build.zig'
      - 'build.zig.zon'
      - 'tests/**'
      - '.github/workflows/**'

jobs:
  build-and-test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Build
        run: zig build

      - name: Test dns
        run: zig test src/dns.zig

      - name: Test requests + har
        run: zig test src/har.zig

      - name: Test proxy
        run: zig test src/proxy.zig

      - name: Test intercept
        run: zig test src/intercept.zig

      - name: Test search
        run: zig test src/search.zig

      - name: Test clipboard
        run: zig test src/clipboard.zig

      - name: Test install/uninstall
        run: zig test tests/install.zig

  build-and-test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Build
        run: zig build

      - name: Test dns
        run: zig test src/dns.zig

      - name: Test requests + har
        run: zig test src/har.zig

      - name: Test proxy
        run: zig test src/proxy.zig

      - name: Test intercept
        run: zig test src/intercept.zig

      - name: Test search
        run: zig test src/search.zig

      - name: Test clipboard
        run: zig test src/clipboard.zig

      - name: Test install/uninstall
        run: zig test tests/install.zig

  build-and-test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set HostName to match LocalHostName
        run: sudo scutil --set HostName "$(scutil --get LocalHostName)"

      - name: Debug hostname
        run: |
          echo "LocalHostName: $(scutil --get LocalHostName)"
          echo "HostName: $(scutil --get HostName)"
          echo "gethostname: $(hostname)"

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Build
        run: zig build

      - name: Test dns
        run: zig test src/dns.zig

      - name: Test requests + har
        run: zig test src/har.zig

      - name: Test proxy
        run: zig test src/proxy.zig

      - name: Test intercept
        run: zig test src/intercept.zig

      - name: Test search
        run: zig test src/search.zig

      - name: Test clipboard
        run: zig test src/clipboard.zig

      - name: Test install/uninstall
        run: zig test tests/install.zig

  integration-test-linux:
    needs: build-and-test-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Build
        run: zig build

      - name: Install hurl
        run: |
          curl -sSL https://github.com/Orange-OpenSource/hurl/releases/download/6.0.0/hurl_6.0.0_amd64.deb -o /tmp/hurl.deb
          sudo dpkg -i /tmp/hurl.deb

      - name: Install httpbin
        run: |
          python3 -m venv .venv
          .venv/bin/pip install httpbin==0.10.2 gunicorn==23.0.0

      - name: Setup capabilities
        run: sudo setcap 'cap_net_bind_service=+ep' ./zig-out/bin/zlodev

      - name: Configure systemd-resolved as system resolver
        run: |
          sudo ln -sf /run/systemd/resolve/stub-resolv.conf /etc/resolv.conf
          # Use nss-resolve for per-link DNS routing (stub at 127.0.0.53
          # may not reliably route custom TLDs via per-link config)
          sudo apt-get install -y libnss-resolve
          sudo sed -i 's/^hosts:.*/hosts: files resolve [!UNAVAIL=return] dns/' /etc/nsswitch.conf
          sudo systemctl restart systemd-resolved

      - name: Setup tmate debug session
        uses: mxschmitt/action-tmate@v3
        with:
          detached: true

      - name: Run integration tests
        timeout-minutes: 10
        run: |
          export PATH="$(pwd)/.venv/bin:$PATH"
          # Enable core dumps for segfault diagnosis
          ulimit -c unlimited
          sudo sysctl -w kernel.core_pattern=$(pwd)/core.%p
          zig test tests/integration.zig

      - name: DNS diagnostics on failure
        if: failure()
        run: |
          echo "=== resolv.conf ==="
          cat /etc/resolv.conf
          echo "=== resolvectl status ==="
          resolvectl status || true
          echo "=== resolvectl query dev.lo ==="
          resolvectl query dev.lo || true
          echo "=== ip link show zlodev0 ==="
          ip link show zlodev0 || true
          echo "=== networkctl status zlodev0 ==="
          networkctl status zlodev0 || true

      - name: Analyze core dump on failure
        if: failure()
        run: |
          CORE=$(find . -maxdepth 1 -name 'core.*' -type f 2>/dev/null | head -1)
          if [ -n "$CORE" ]; then
            sudo apt-get install -y gdb
            gdb -batch -ex "thread apply all bt full" ./zig-out/bin/zlodev "$CORE"
          else
            echo "No core dump found — segfault may be in a child process"
            # Try looking system-wide
            find /tmp -name 'core.*' 2>/dev/null | head -5
          fi

  integration-test-macos:
    needs: build-and-test-macos
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set HostName to match LocalHostName
        run: sudo scutil --set HostName "$(scutil --get LocalHostName)"

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Build
        run: zig build

      - name: Install hurl
        run: brew install hurl

      - name: Install httpbin
        run: |
          python3 -m venv .venv
          .venv/bin/pip install httpbin==0.10.2 gunicorn==23.0.0

      - name: Run integration tests
        timeout-minutes: 10
        run: |
          export PATH="$(pwd)/.venv/bin:$PATH"
          zig test tests/integration.zig

  integration-test-windows:
    needs: build-and-test-windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Build
        run: zig build

      - name: Free port 80
        shell: pwsh
        run: |
          # Stop services that may hold port 80
          Stop-Service W3SVC -ErrorAction SilentlyContinue
          Stop-Service WAS -ErrorAction SilentlyContinue
          netsh http delete urlacl url=http://+:80/ 2>$null
          # Show what's using port 80 for diagnostics
          netstat -ano | Select-String ":80 " | Select-String "LISTENING"

      - name: Setup tmate debug session
        uses: mxschmitt/action-tmate@v3
        with:
          detached: true

      - name: Run integration tests
        timeout-minutes: 10
        run: zig test tests/integration.zig
